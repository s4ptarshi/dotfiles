[config]

[templates.kvantum_kvconfig]
input_path = '~/.config/matugen/templates/kvantum-colors.kvconfig'
output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

[templates.kvantum_svg]
input_path = '~/.config/matugen/templates/kvantum-colors.svg'
output_path = '~/.config/Kvantum/matugen/matugen.svg'

[templates.obsidian]
input_path = "~/.config/matugen/templates/obsidian-shimmer.css"
output_path = "~/gdrive/300 - Resources/Obsidian Vault/.obsidian/snippets/matugen.css"

[templates.kdeLight]
input_path = "~/.config/matugen/templates/Matugen.colors"
output_path = "~/.local/share/color-schemes/Matugena.colors"

[templates.kdeDark]
input_path = "~/.config/matugen/templates/Matugen.colors"
output_path = "~/.local/share/color-schemes/Matugenb.colors"

[templates.zathura]
input_path = '~/.config/matugen/templates/zathura-colors'
output_path = '~/.config/zathura/zathurarc'

[templates.sioyek]
input_path = '~/.config/matugen/templates/sioyek-colors'
output_path = '~/.config/sioyek/prefs_user.config'
