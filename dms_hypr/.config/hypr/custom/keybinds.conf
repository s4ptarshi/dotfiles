# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
# bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
# bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above
#
gesture = 4, swipe, move,
gesture = 3, pinch, float
gesture = 3, horizontal, workspace
# gesture = 4, up, dispatcher, global, dms ipc call hypr toggleOverview
# gesture = 4, down, dispatcher, global, quickshell:overviewWorkspacesToggle
gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}
$BROWSER = uwsm app flatpak run app.zen_browser.zen
$FILE_MANAGER = uwsm app dolphin

bind = Meta, B, exec, $BROWSER # Zen Browser
bind = Meta Shift, B, exec, $BROWSER # Zen Browser
bind = Meta, E, exec, $FILE_MANAGER # Dolphin

# unbind = Meta, B
# unbind = Meta, Tab
unbind =  Super, 1
unbind =  Super, 2
unbind =  Super, 3
unbind =  Super, 4
unbind =  Super, 5
unbind =  Super, 6
unbind =  Super, 7
unbind =  Super, 8
unbind =  Super, 9
# unbind = Super, h
# unbind = Super, l
# unbind = Super, K
# unbind = Super, J
# unbind = Super, T

bind = , XF86Launch1, exec, uwsm app rog-control-center
# bind = , XF86Launch4, exec, asusctl profile -n
# bindd = Super, Escape, Lock, exec, loginctl lock-session # Lock

##! Media keys additional
# bindl=,XF86KbdBrightnessUp,exec,brightnessctl -d asus::kbd_backlight s 1+ #Keyboard brightness up
# bindl=,XF86KbdBrightnessDown,exec,brightnessctl -d asus::kbd_backlight s 1- #Keyboard brightness down

##! Swapping
# bind = alt, tab, focusmonitor, +1 # Focus on next monitor
# bind =  alt shift, tab, focusmonitor, -1 # Focus on Previous monitor
bind = alt, h, focusmonitor, l # Focus left monitor
bind = alt, l, focusmonitor, r # Focus right monitor
bind = , F2, focusmonitor, r # Focus left monitor
bind = , F1, focusmonitor, l # Focus right monitor
# bind =  Super, tab, swapactiveworkspaces, current +1 # Switch workspace with next monitor
# bind =  Super shift, tab, swapactiveworkspaces, current -1 # Switch workspace with previous monitor

bind = Super, 1, split:workspace, 1 # [hidden] move current workspace to workspace 1
bind = Super, 2, split:workspace, 2 # [hidden] move current workspace to workspace 2
bind = Super, 3, split:workspace, 3 # [hidden] move current workspace to workspace 3
bind = Super, 4, split:workspace, 4 # [hidden] move current workspace to workspace 4
bind = Super, 5, split:workspace, 5 # [hidden] move current workspace to workspace 5
bind = Super, 6, split:workspace, 6 # [hidden] move current workspace to workspace 6
bind = Super, 7, split:workspace, 7 # [hidden] move current workspace to workspace 7
bind = Super, 8, split:workspace, 8 # [hidden] move current workspace to workspace 8
bind = Super, 9, split:workspace, 9 # [hidden] move current workspace to workspace 9

#/# bind = Super+Alt, Hash,, # Send to workspace # (1, 2, 3,...)
unbind = Super+Alt, 1
unbind = Super+Alt, 2
unbind = Super+Alt, 3
unbind = Super+Alt, 4
unbind = Super+Alt, 5
unbind = Super+Alt, 6
unbind = Super+Alt, 7
unbind = Super+Alt, 8
unbind = Super+Alt, 9
unbind = Super+Alt, 0
#/# bind = Super+Shift, Hash,, # Send to workspace # (1, 2, 3,...)
bind = Super+Shift, 1, split:movetoworkspacesilent, 1 # [hidden]
bind = Super+Shift, 2, split:movetoworkspacesilent, 2 # [hidden]
bind = Super+Shift, 3, split:movetoworkspacesilent, 3 # [hidden]
bind = Super+Shift, 4, split:movetoworkspacesilent, 4 # [hidden]
bind = Super+Shift, 5, split:movetoworkspacesilent, 5 # [hidden]
bind = Super+Shift, 6, split:movetoworkspacesilent, 6 # [hidden]
bind = Super+Shift, 7, split:movetoworkspacesilent, 7 # [hidden]
bind = Super+Shift, 8, split:movetoworkspacesilent, 8 # [hidden]
bind = Super+Shift, 9, split:movetoworkspacesilent, 9 # [hidden]
bind = Super+Shift, 0, split:movetoworkspacesilent, 10 # [hidden]
bind = Super+Shift, left, split:swapactiveworkspaces, current -1
bind = Super+Shift, right, split:swapactiveworkspaces, current +1
bind = Super, Page_Up, split:workspace, +1
bind = Super, Page_Down, split:workspace, -1
bind = SUPER, G, split:grabroguewindows
# bind = Super, Page_Down, workspace, previous # Prev visited workspace
# bind = Super, Page_Up, workspace, emptym # Focus next empty workspace
# bind = Super+Alt, T, movetoworkspacesilent, special:timer # Send to Timer workspace
# bind = Super, T, togglespecialworkspace, timer # Open timer

# Scrolling
# bind = $mainMod, L, layoutmsg, move +col
# bind = $mainMod, H, layoutmsg, move -col
bind = $mainMod, L, layoutmsg, focus right
bind = $mainMod, H, layoutmsg, focus left
bind = $mainMod, J, layoutmsg, focus down
bind = $mainMod, K, layoutmsg, focus up
bind = $mainMod Shift, L, layoutmsg, swapcol r
bind = $mainMod Shift, H, layoutmsg, swapcol l
bind = $mainMod, bracketleft, exec, hyprctl --batch "dispatch movewindow l ; dispatch movewindow d"
bind = $mainMod, bracketright, exec, hyprctl --batch "dispatch movewindow u ; dispatch movewindow r"
# bind = $mainMod, H, layoutmsg, move -col
bind = $mainMod, R, layoutmsg, colresize +conf
# bind = SUPER, F, layoutmsg, colresize 1.0
bind = SUPER, F, exec, ~/.config/hypr/custom/scripts/toggle_fullscreen.sh
# bind = SUPER, H, movefocus, l
# bind = SUPER, J, movefocus, d
# bind = SUPER, K, movefocus, u
# bind = SUPER, L, movefocus, r
# bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
# bind = SUPER SHIFT, L, movewindow, r
