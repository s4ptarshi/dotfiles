# --- Basic Navigation ---
h seek -5
l seek  5
j seek -60
k seek  60

# --- Fine Navigation ---
Ctrl+h seek -1
Ctrl+l seek  1

# --- Speed Control ---
# [ and ] to adjust speed
[ multiply speed 0.9091
] multiply speed 1.1
# Reset speed to 1.0 with backspace
BS set speed 1.0

# --- Volume ---
# Using arrow keys or Vim-style if preferred
+ add volume 5
- add volume -5

# --- Subtitles ---
# s cycle through subs
s cycle sub
# S cycle through subs backwards
S cycle sub down
# Toggle visibility
v cycle sub-visibility

# --- Audio Tracks ---
a cycle audio

# --- Playback ---
# Space to pause, q to quit
space cycle pause
q quit
# 'p' for playlist navigation
p show-text "${playlist}"
> playlist-next
< playlist-prev

# --- Fullscreen & UI ---
f cycle fullscreen
i show-progress
# Toggle info/stats (using 'o' like Vim)
o show-text "${track-list}"
